<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">FreeMergePDF homepage share image with founder portrait</title>
  <desc id="desc">A social share card showing FreeMergePDF value proposition and a personal portrait.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <clipPath id="portraitClip">
      <rect x="0" y="0" width="318" height="318" rx="36"/>
    </clipPath>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1090" cy="95" r="170" fill="#ffffff" opacity="0.08"/>
  <circle cx="70" cy="560" r="170" fill="#ffffff" opacity="0.05"/>

  <rect x="64" y="64" width="1072" height="502" rx="40" fill="#ffffff" filter="url(#shadow)"/>

  <g transform="translate(110 116)">
    <rect x="0" y="0" width="318" height="318" rx="36" fill="#e2e8f0"/>
    <image href="yanis-avatar.jpg" x="0" y="0" width="318" height="318" preserveAspectRatio="xMidYMid slice" clip-path="url(#portraitClip)"/>
    <rect x="0" y="0" width="318" height="318" rx="36" fill="none" stroke="#bfdbfe" stroke-width="4"/>
  </g>

  <text x="470" y="185" font-family="Inter, Arial, Helvetica, sans-serif" font-size="58" font-weight="800" fill="#0f172a">FreeMergePDF</text>
  <text x="470" y="250" font-family="Inter, Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#1d4ed8">Merge PDF files privately in seconds</text>

  <text x="470" y="320" font-family="Inter, Arial, Helvetica, sans-serif" font-size="30" fill="#334155">No upload • No sign up • No watermark</text>
  <text x="470" y="370" font-family="Inter, Arial, Helvetica, sans-serif" font-size="30" fill="#334155">Works right in your browser on any device</text>

  <rect x="470" y="428" width="458" height="74" rx="37" fill="url(#pill)"/>
  <text x="500" y="475" font-family="Inter, Arial, Helvetica, sans-serif" font-size="31" font-weight="800" fill="#ffffff">Your PDFs never leave your device</text>
</svg>
