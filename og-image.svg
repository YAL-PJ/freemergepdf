<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">FreeMergePDF browser-based PDF merger</title>
  <desc id="desc">FreeMergePDF browser-based PDF merger with no sign up and no uploads.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#667eea"/>
      <stop offset="1" stop-color="#764ba2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1f2937" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1040" cy="95" r="150" fill="#ffffff" opacity="0.08"/>
  <circle cx="120" cy="560" r="190" fill="#ffffff" opacity="0.08"/>
  <rect x="90" y="78" width="1020" height="474" rx="36" fill="#ffffff" filter="url(#shadow)"/>
  <g transform="translate(128 126)">
    <rect x="0" y="0" width="126" height="156" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="6"/>
    <path d="M82 0v48h44" fill="none" stroke="#4f46e5" stroke-width="6" stroke-linejoin="round"/>
    <text x="24" y="104" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#4f46e5">PDF</text>
  </g>
  <text x="290" y="170" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="800" fill="#111827">FreeMergePDF</text>
  <text x="290" y="240" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700" fill="#4f46e5">Free PDF Merger No Sign Up</text>
  <text x="128" y="360" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#374151">Merge PDFs locally in your browser.</text>
  <text x="128" y="410" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#374151">No uploads • No watermarks • Works on any device</text>
  <rect x="128" y="462" width="345" height="56" rx="28" fill="#059669"/>
  <text x="158" y="499" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Files stay on your device</text>
</svg>
